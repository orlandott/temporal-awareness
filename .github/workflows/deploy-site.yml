name: Deploy site

# Builds the public Astro site (site/) and deploys it to GitHub Pages.
# Generated data is rebuilt from results/ on every deploy, so the site never
# drifts from the verified numbers.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "scripts/site/**"
      - "results/verified/**"
      - "results/figures/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate site data from verified results
        run: python scripts/site/export_site_data.py # stdlib only — no project install needed

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        env:
          PUBLIC_BASE_PATH: /temporal-awareness # project page: https://OWNER.github.io/temporal-awareness
        run: npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
